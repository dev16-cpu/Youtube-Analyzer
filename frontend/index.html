<!DOCTYPE html>
<html>
<head>
    <title>YouTube Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        h2 {
            color: #ff0000;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #cc0000;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            display: inline-block;
            text-align: left;
        }
    </style>
</head>

<body>

<h2>📺 YouTube Video Analyzer</h2>

<input id="url" placeholder="Paste YouTube link">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>
function analyze() {
    const url = document.getElementById("url").value;

   fetch("https://youtube-analyzer-m1oo.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ url: url })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById("result").innerText = data.error;
            return;
        }

        document.getElementById("result").innerHTML =
            `<b>Title:</b> ${data.title}<br>
             <b>Genre:</b> ${data.genre}<br>
             <b>Duration:</b> ${data.duration}<br>
             <b>Keywords:</b> ${data.keywords.join(", ")}`;
    });
}
</script>

</body>
</html>
